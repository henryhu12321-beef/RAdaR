dataset_path: lmms-lab/ai2d
task: "ai2d"
dataset_kwargs:
  token: True
test_split: test
output_type: generate_until
doc_to_visual: !function utils.ai2d_doc_to_visual
doc_to_text: !function utils.ai2d_doc_to_text
doc_to_target: "answer"
process_results: !function utils.ai2d_process_results

lmms_eval_specific_kwargs:
  default:
    profile: default
    prompt_format: mcq
    pre_prompt: ""
    post_prompt: "\nAnswer with ONLY the option's letter from the given choices (A, B, C, or D)."

  gpt4v: 
    profile: gpt4v
    prompt_format: mcq
    pre_prompt: ""
    post_prompt: "\nAbove choices are given in {option}. {content} format.\nPlease answer with ONLY the option's letter from the given choices (A, B, C, or D)."
  qwen_vl:
    profile: qwen_vl
    prompt_format: qa
    pre_prompt: ""
    post_prompt: "\nAnswer with ONLY the option's letter from the given choices (A, B, C, or D). Do not output anything else. "
  xcomposer2_4khd:
    profile: xcomposer2_4khd
    prompt_format: mcq_xcomposer
    pre_prompt: "[UNUSED_TOKEN_146]user\nQuestion: "
    post_prompt: "[UNUSED_TOKEN_145]\n[UNUSED_TOKEN_146]assistant\nThe answer is"

model_specific_target_kwargs:
  default: "mcq"
  qwen_vl: "qa"

generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  do_sample: False

filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function utils.MultiChoiceRegexFilter
        group_select: 0
        ignore_case: true
        ignore_punctuation: true
        regex_pattern: "([A-Z])\\."

metric_list:
  - metric: exact_match
    aggregation: !function utils.ai2d_aggregate_accuracy
    higher_is_better: true

metadata:
  - version: 0.0